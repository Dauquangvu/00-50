<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trắc Nghiệm Báo Cáo Viên</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Noto+Serif:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
:root {
  --bg-deep:    #0b0e13;
  --bg-card:    #111620;
  --bg-panel:   #161c2a;
  --border:     rgba(255,255,255,0.07);
  --accent:     #c8a84b;
  --accent-dim: rgba(200,168,75,0.15);
  --accent2:    #4b8fc8;
  --green:      #2ecc71;
  --green-dim:  rgba(46,204,113,0.15);
  --red:        #e74c3c;
  --red-dim:    rgba(231,76,60,0.15);
  --text-main:  #e8ecf3;
  --text-dim:   #6b7891;
  --text-mid:   #a0adc4;
  --radius:     10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Serif', Georgia, serif;
  background: var(--bg-deep);
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(200,168,75,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,168,75,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 800px; height: 400px;
  background: radial-gradient(ellipse, rgba(75,143,200,0.12) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.shell {
  position: relative;
  z-index: 1;
  max-width: 820px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

header {
  margin-bottom: 36px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid rgba(200,168,75,0.25);
  padding: 5px 14px;
  border-radius: 4px;
  width: fit-content;
}

.header-badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}

h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(28px, 5vw, 44px);
  font-weight: 800;
  letter-spacing: 1px;
  line-height: 1.1;
  color: #fff;
}

h1 span { color: var(--accent); }

.header-sub {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

.stats-bar {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr auto;
  gap: 12px;
  margin-bottom: 28px;
  align-items: center;
}

.stat-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.stat-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
}

.stat-value {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--text-main);
  line-height: 1;
}

.stat-value.correct-num { color: var(--green); }
.stat-value.wrong-num { color: var(--red); }

.progress-ring-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}

.ring-svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 5; }
.ring-fg { fill: none; stroke: var(--accent2); stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
.ring-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  fill: var(--text-main);
  dominant-baseline: middle;
  text-anchor: middle;
}

.progress-track {
  height: 4px;
  background: rgba(255,255,255,0.05);
  border-radius: 99px;
  margin-bottom: 32px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 99px;
  transition: width 0.6s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 12px rgba(75,143,200,0.5);
}

.q-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 16px;
  overflow: hidden;
  animation: cardIn 0.4s ease both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.q-header {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 22px 24px 18px;
  border-bottom: 1px solid var(--border);
}

.q-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid rgba(200,168,75,0.2);
  border-radius: 4px;
  padding: 3px 10px;
  white-space: nowrap;
  margin-top: 2px;
  flex-shrink: 0;
}

.q-text {
  font-size: 15px;
  line-height: 1.65;
  color: var(--text-main);
}

.q-answers {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.ans-btn {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  width: 100%;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 18px;
  cursor: pointer;
  text-align: left;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  color: var(--text-mid);
  font-family: 'Noto Serif', serif;
  font-size: 14px;
  line-height: 1.6;
}

.ans-btn:hover:not(:disabled) {
  border-color: rgba(75,143,200,0.4);
  background: rgba(75,143,200,0.06);
  color: var(--text-main);
  transform: translateX(3px);
}

.ans-letter {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-dim);
  background: rgba(255,255,255,0.05);
  border-radius: 4px;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, color 0.2s;
  margin-top: 1px;
}

.ans-btn:hover:not(:disabled) .ans-letter {
  background: rgba(75,143,200,0.2);
  color: var(--accent2);
}

.ans-btn.correct {
  background: var(--green-dim) !important;
  border-color: var(--green) !important;
  color: var(--text-main) !important;
  cursor: default;
}
.ans-btn.correct .ans-letter {
  background: var(--green) !important;
  color: #fff !important;
}

.ans-btn.wrong {
  background: var(--red-dim) !important;
  border-color: var(--red) !important;
  color: var(--text-mid) !important;
  cursor: default;
  opacity: 0.7;
}
.ans-btn.wrong .ans-letter {
  background: var(--red) !important;
  color: #fff !important;
}

.ans-btn:disabled { cursor: default; transform: none !important; }

.icon-tag {
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 2px;
  min-width: 18px;
}

.q-card.done .q-header { border-bottom-color: transparent; }
.q-card.done.card-correct { border-left: 3px solid var(--green); }
.q-card.done.card-wrong   { border-left: 3px solid var(--red); }

#final-panel {
  display: none;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 40px 32px;
  text-align: center;
  margin-top: 24px;
  animation: cardIn 0.5s ease;
}

#final-panel h2 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 36px;
  font-weight: 800;
  color: var(--accent);
  margin-bottom: 8px;
}

#final-panel p {
  color: var(--text-mid);
  font-size: 15px;
  margin-bottom: 28px;
}

.grade-badge {
  display: inline-block;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 64px;
  font-weight: 800;
  line-height: 1;
  padding: 16px 40px;
  border-radius: 12px;
  margin-bottom: 24px;
}

.grade-S { color: #fff; background: linear-gradient(135deg,#c8a84b,#e8cc6e); }
.grade-A { color: #fff; background: linear-gradient(135deg,#27ae60,#2ecc71); }
.grade-B { color: #fff; background: linear-gradient(135deg,#2980b9,#4b8fc8); }
.grade-C { color: #fff; background: linear-gradient(135deg,#e67e22,#f39c12); }
.grade-D { color: #fff; background: linear-gradient(135deg,#e74c3c,#c0392b); }

.restart-btn {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 14px 40px;
  background: var(--accent);
  color: #0b0e13;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
}
.restart-btn:hover { opacity: 0.85; transform: translateY(-2px); }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

@media (max-width: 600px) {
  .stats-bar { grid-template-columns: 1fr 1fr; }
  .progress-ring-wrap { grid-column: 1/-1; flex-direction: row; gap: 12px; padding: 12px 18px; }
  .q-header { padding: 16px 16px 14px; }
  .q-answers { padding: 10px; gap: 6px; }
  .ans-btn { padding: 12px 14px; font-size: 13px; }
}
</style>
</head>

<body>
<div class="shell">

  <header>
    <div class="header-badge">Trung đoàn Bộ binh 1</div>
    <h1>Trắc Nghiệm <span>Báo Cáo Viên</span></h1>
    <div class="header-sub">HỆ THỐNG KIỂM TRA KIẾN THỨC — QUÂN ĐỘI NHÂN DÂN VIỆT NAM</div>
  </header>

  <div class="stats-bar">
    <div class="stat-box">
      <div class="stat-label">Tổng câu</div>
      <div class="stat-value" id="total-num">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Đúng</div>
      <div class="stat-value correct-num" id="correct-num">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Sai</div>
      <div class="stat-value wrong-num" id="wrong-num">0</div>
    </div>
    <div class="progress-ring-wrap">
      <svg class="ring-svg" width="70" height="70" viewBox="0 0 70 70">
        <circle class="ring-bg" cx="35" cy="35" r="28"/>
        <circle class="ring-fg" id="ring-fg" cx="35" cy="35" r="28"
          stroke-dasharray="175.9" stroke-dashoffset="175.9"/>
        <text class="ring-label" x="35" y="36" id="ring-pct" transform="rotate(90 35 35)">0%</text>
      </svg>
    </div>
  </div>

  <div class="progress-track">
    <div class="progress-fill" id="prog-fill"></div>
  </div>

  <div id="quiz"></div>

  <div id="final-panel">
    <div class="grade-badge" id="grade-badge">—</div>
    <h2 id="final-title">KẾT QUẢ</h2>
    <p id="final-desc">—</p>
    <button class="restart-btn" onclick="location.reload()">&#8635; &nbsp;LÀM LẠI</button>
  </div>

</div>

<script>
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

let scoreC = 0, scoreW = 0, answered = 0;

const questions = [
  {"q":"Đồng chí cho biết Thủ đoạn chiến lược \"diễn biến hòa bình\" của các thế lực thù địch chống phá cách mạng Việt Nam là gì?","answers":["Chống phá trên lĩnh vực chính trị; chống phá trên lĩnh vực tư tưởng, văn hóa; chống phá trên lĩnh vực xã hội; chống phá trên lĩnh vực quốc phòng, an ninh; chống phá trên lĩnh vực đối ngoại","Chống phá trên lĩnh vực chính trị; chống phá trên lĩnh vực kinh tế; chống phá trên lĩnh vực tư tưởng, văn hóa; chống phá trên lĩnh vực xã hội; chống phá trên lĩnh vực quốc phòng, an ninh","Chống phá trên lĩnh vực chính trị; chống phá trên lĩnh vực kinh tế; chống phá trên lĩnh vực tư tưởng, văn hóa; chống phá trên lĩnh vực quốc phòng, an ninh; chống phá trên lĩnh vực đối ngoại","Chống phá trên lĩnh vực chính trị; chống phá trên lĩnh vực kinh tế; chống phá trên lĩnh vực tư tưởng, văn hóa; chống phá trên lĩnh vực xã hội; chống phá trên lĩnh vực quốc phòng, an ninh; chống phá trên lĩnh vực đối ngoại"],"correct":3},
  {"q":"Đồng chí cho biết Nghị quyết Đại hội đại biểu toàn quốc lần thứ XIII của Đảng xác định mục tiêu cụ thể của nước ta đến năm 2025 là gì?","answers":["Kỷ niệm 50 năm giải phóng hoàn toàn Miền Nam, thống nhất đất nước: Là nước đang phát triển, có công nghiệp hiện đại, có thu nhập trung bình thấp","Kỷ niệm 50 năm giải phóng hoàn toàn Miền Nam, thống nhất đất nước: Là nước đang phát triển, có công nghiệp theo hướng hiện đại, vượt qua mức thu nhập trung bình thấp","Kỷ niệm 50 năm giải phóng hoàn toàn Miền Nam, thống nhất đất nước: Là nước phát triển, có công nghiệp hiện đại, thu nhập trung bình cao","Kỷ niệm 50 năm giải phóng hoàn toàn Miền Nam, thống nhất đất nước: Là nước đang phát triển, có công nghiệp theo hướng hiện đại, có mức thu nhập trung bình cao"],"correct":1},
  {"q":"Đồng chí cho biết chức năng của công tác tuyên truyền miệng?","answers":["Phổ biến thông tin. Định hướng tư tưởng. Hướng dẫn hành động","Phổ biến thông tin. Định hướng tư tưởng. Cổ vũ hành động","Phổ biến thông tin. Định hướng nhận thức. Cổ vũ hành động","Phổ biến thông tin. Định hướng nhận thức. Hướng dẫn hành động"],"correct":1},
  {"q":"Đồng chí cho biết Chỉ thị số 366/CT-ĐU của Ban Thường vụ Đảng ủy Sư đoàn về xây dựng \"chi bộ bốn tốt\", \"đảng bộ cơ sở bốn tốt\" xác định bao nhiêu nhiệm vụ, giải pháp?","answers":["4 nhiệm vụ, giải pháp","5 nhiệm vụ, giải pháp","6 nhiệm vụ, giải pháp","7 nhiệm vụ, giải pháp"],"correct":1},
  {"q":"Đồng chí cho biết tên gọi Kết luận số 21-KL/TW của Ban Chấp hành Trung ương Đảng khóa XIII là gì?","answers":["Về đẩy mạnh xây dựng, chỉnh đốn đảng; kiên quyết ngăn chặn, đẩy lùi, xử lý nghiêm cán bộ, đảng viên suy thoái về tư tưởng chính trị, đạo đức, lối sống, biểu hiện \"tự diễn biến\", \"tự chuyển hoá\".","Về đẩy mạnh xây dựng, chỉnh đốn đảng và hệ thống chính trị; ngăn chặn, đẩy lùi, xử lý nghiêm cán bộ, đảng viên suy thoái về tư tưởng chính trị, đạo đức, lối sống, biểu hiện \"tự diễn biến\", \"tự chuyển hoá\".","Về đẩy mạnh xây dựng, chỉnh đốn đảng và hệ thống chính trị; kiên quyết ngăn chặn, đẩy lùi, xử lý nghiêm cán bộ, đảng viên suy thoái về tư tưởng chính trị, đạo đức, lối sống, biểu hiện \"tự diễn biến\", \"tự chuyển hoá\".","Về đẩy mạnh xây dựng, chỉnh đốn đảng và hệ thống chính trị; kiên quyết đẩy lùi, xử lý nghiêm cán bộ, đảng viên suy thoái về tư tưởng chính trị, đạo đức, lối sống, biểu hiện \"tự diễn biến\", \"tự chuyển hoá\"."],"correct":2},
  {"q":"Đồng chí cho biết Quy định số 144-QĐ/TW ngày 09/5/2024 của Bộ Chính trị về chuẩn mực đạo đức cách mạng của cán bộ, đảng viên trong giai đoạn mới có mấy nội dung cơ bản?","answers":["04 nội dung","05 nội dung","06 nội dung","07 nội dung"],"correct":1},

  {"q":"Đồng chí khái niệm của công tác tuyên truyền miệng là gì?","answers":["Tuyên truyền miệng là một hình thức tuyên truyền được tiến hành thông qua sự giao tiếp trực tiếp giữa người nói (người tuyên truyền) với người nghe (đối tượng tuyên truyền).","Tuyên truyền miệng là một hình thức tuyên truyền được tiến hành thông qua sự giao tiếp bằng lời nói trực tiếp giữa người nói (nhà tuyên truyền) với người nghe (đối tượng tuyên truyền).","Tuyên truyền miệng là một hình thức tuyên truyền được tiến hành thông qua sự giao tiếp thực tiễn bằng lời nói trực tiếp giữa người nói (nhà tuyên truyền) với người nghe (đối tượng tuyên truyền).","Tuyên truyền miệng là một hình thức tuyên truyền được tiến hành thông qua nói chuyện bằng lời nói trực tiếp giữa người nói (nhà tuyên truyền) với người nghe (đối tượng tuyên truyền)."],"correct":1},

const TOTAL = questions.length;
document.getElementById('total-num').textContent = TOTAL;
const circumference = 2 * Math.PI * 28;

function updateUI() {
  document.getElementById('correct-num').textContent = scoreC;
  document.getElementById('wrong-num').textContent = scoreW;
  const pct = answered > 0 ? Math.round(scoreC / answered * 100) : 0;
  document.getElementById('ring-pct').textContent = pct + '%';
  const offset = circumference - (scoreC / TOTAL) * circumference;
  document.getElementById('ring-fg').style.strokeDashoffset = offset;
  document.getElementById('prog-fill').style.width = (answered / TOTAL * 100) + '%';
  if (answered === TOTAL) showFinal();
}

function showFinal() {
  const fp = document.getElementById('final-panel');
  fp.style.display = 'block';
  fp.scrollIntoView({ behavior: 'smooth', block: 'center' });
  const ratio = scoreC / TOTAL;
  let grade, cls, title, desc;
  if      (ratio >= 0.95) { grade='S'; cls='grade-S'; title='XUẤT SẮC!';     desc='Bạn nắm vững toàn bộ kiến thức. Kết quả tuyệt vời!'; }
  else if (ratio >= 0.80) { grade='A'; cls='grade-A'; title='GIỎI!';          desc='Kết quả rất tốt. Hãy tiếp tục phát huy!'; }
  else if (ratio >= 0.65) { grade='B'; cls='grade-B'; title='KHÁ!';           desc='Kết quả khá. Cần ôn luyện thêm một số phần.'; }
  else if (ratio >= 0.50) { grade='C'; cls='grade-C'; title='TRUNG BÌNH';     desc='Cần ôn tập lại các nội dung chưa nắm chắc.'; }
  else                     { grade='D'; cls='grade-D'; title='CẦN CỐ GẮNG';   desc='Hãy ôn tập lại toàn bộ nội dung và thử lại.'; }
  const gb = document.getElementById('grade-badge');
  gb.textContent = grade;
  gb.className = 'grade-badge ' + cls;
  document.getElementById('final-title').textContent = title;
  document.getElementById('final-desc').textContent =
    'Bạn trả lời đúng ' + scoreC + '/' + TOTAL + ' câu (' + Math.round(scoreC/TOTAL*100) + '%). ' + desc;
}

shuffle(questions);

const quizDiv = document.getElementById('quiz');
const letters = ['A','B','C','D'];

questions.forEach(function(q, idx) {
  const answers = q.answers.map(function(a, i) { return { text: a, correct: i === q.correct }; });
  shuffle(answers);

  const card = document.createElement('div');
  card.className = 'q-card';

  const qh = document.createElement('div');
  qh.className = 'q-header';
  const qNum = document.createElement('span');
  qNum.className = 'q-num';
  qNum.textContent = 'CÂU ' + (idx + 1);
  const qText = document.createElement('span');
  qText.className = 'q-text';
  qText.textContent = q.q;
  qh.appendChild(qNum);
  qh.appendChild(qText);
  card.appendChild(qh);

  const qa = document.createElement('div');
  qa.className = 'q-answers';

  answers.forEach(function(ans, i) {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';

    const letter = document.createElement('span');
    letter.className = 'ans-letter';
    letter.textContent = letters[i];

    const ansText = document.createElement('span');
    ansText.className = 'ans-text';
    ansText.textContent = ans.text;

    const icon = document.createElement('span');
    icon.className = 'icon-tag';

    btn.appendChild(letter);
    btn.appendChild(ansText);
    btn.appendChild(icon);

    btn.onclick = function() {
      if (card.classList.contains('done')) return;
      card.classList.add('done');
      answered++;

      const allBtns = qa.querySelectorAll('.ans-btn');
      allBtns.forEach(function(b) { b.disabled = true; });

      if (ans.correct) {
        btn.classList.add('correct');
        icon.textContent = '✅';
        card.classList.add('card-correct');
        scoreC++;
      } else {
        btn.classList.add('wrong');
        icon.textContent = '❌';
        card.classList.add('card-wrong');
        scoreW++;
        answers.forEach(function(a2, ai) {
          if (a2.correct) {
            allBtns[ai].classList.add('correct');
            allBtns[ai].querySelector('.icon-tag').textContent = '⭐';
          }
        });
      }
      updateUI();
    };

    qa.appendChild(btn);
  });

  card.appendChild(qa);
  quizDiv.appendChild(card);
});

updateUI();
</script>
